[www]
user = www-data
group = www-data

listen = 0.0.0.0:9000

pm = dynamic
pm.max_children = 50
pm.start_servers = 10
pm.min_spare_servers = 5
pm.max_spare_servers = 20
pm.max_requests = 500

; Logging
access.log = /var/www/micrologs/logs/php-fpm-access.log
slowlog = /var/www/micrologs/logs/php-fpm-slow.log
request_slowlog_timeout = 5s