[program:micrologs-pageview]
command=php /var/www/micrologs/workers/pageview-worker.php
directory=/var/www/micrologs
autostart=true
autorestart=true
startretries=5
numprocs=3
process_name=%(program_name)s_%(process_num)02d
stdout_logfile=/var/www/micrologs/logs/pageview-worker.log
stderr_logfile=/var/www/micrologs/logs/pageview-worker-error.log
user=www-data

[program:micrologs-error]
command=php /var/www/micrologs/workers/error-worker.php
directory=/var/www/micrologs
autostart=true
autorestart=true
startretries=5
numprocs=2
process_name=%(program_name)s_%(process_num)02d
stdout_logfile=/var/www/micrologs/logs/error-worker.log
stderr_logfile=/var/www/micrologs/logs/error-worker-error.log
user=www-data

[program:micrologs-audit]
command=php /var/www/micrologs/workers/audit-worker.php
directory=/var/www/micrologs
autostart=true
autorestart=true
startretries=5
numprocs=2
process_name=%(program_name)s_%(process_num)02d
stdout_logfile=/var/www/micrologs/logs/audit-worker.log
stderr_logfile=/var/www/micrologs/logs/audit-worker-error.log
user=www-data